app = 'kemari-qcvtzg'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[[vm]]
  memory = '4gb'
  cpu_kind = 'performance'
  cpus = 1
  memory_mb = 4096
  processes = ['app']
  size = 'performance-cpu-1x'
