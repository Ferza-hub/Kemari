app = 'kemari-qcvtzg'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 3000   # Pastikan ini SAMA dengan PORT yang di server.js
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1 # Coba set ke 1 dulu agar selalu standby


[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
